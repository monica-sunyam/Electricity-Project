<div class="max-w-xl mx-auto bg-white dark:bg-gray-900 p-6 rounded-2xl shadow">

    <h2 class="text-xl font-semibold text-gray-800 dark:text-white mb-6">
        Sidebar-Menü erstellen
    </h2>

    <form (ngSubmit)="onSubmit()" class="space-y-5">

        <div>
            <label class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">
                Icon/Bild hochladen *
            </label>

            <div
                class="border-2 border-dashed rounded-lg p-4 text-center cursor-pointer hover:border-brand-400 transition">
                <input type="file" accept="image/*" (change)="onFileChange($event)" class="hidden" #fileInput />

                <div (click)="fileInput.click()" class="cursor-pointer">

                    @if (!imagePreview) {
                    <p class="text-sm text-gray-500">
                        Klicken Sie hier, um ein Icon hochzuladen (max. 2MB)
                    </p>
                    }

                    @if (imagePreview) {
                    <img [src]="imagePreview" class="mx-auto h-28 w-28 object-cover rounded-lg" />
                    <p class="text-xs mt-2 text-gray-500">Zum Ändern klicken</p>
                    }

                </div>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
                Menüname *
            </label>

            <input type="text" [(ngModel)]="title" name="title" placeholder="Name des Menüpunkts eingeben"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-brand-500 dark:bg-gray-800 dark:border-gray-700" />
        </div>

        @if (errorMessage) {
        <p class="text-sm text-red-500">
            {{ errorMessage }}
        </p>
        }

        <div class="flex flex-col sm:flex-row gap-3 pt-2">
            <button type="submit" [disabled]="isLoading"
                class="flex-1 bg-brand-500 text-white py-2 rounded-lg hover:bg-brand-600 transition cursor-pointer disabled:opacity-50">
                {{ isLoading ? 'Wird erstellt...' : 'Menü erstellen' }}
            </button>

            <a routerLink="/menus/sidebar"
                class="flex-1 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition text-center cursor-pointer">
                Abbrechen
            </a>
        </div>

    </form>

</div>
