<div class="max-w-xl mx-auto bg-white dark:bg-gray-900 p-6 rounded-2xl shadow">

    <h2 class="text-xl font-semibold text-gray-800 dark:text-white mb-6">
        Kostenlosen Service erstellen
    </h2>

    <form (ngSubmit)="onSubmit()" class="space-y-5">

        <div>
            <label class="block text-sm font-medium mb-1 text-gray-700 dark:text-gray-300">
                Name des Services *
            </label>
            <input type="text" [(ngModel)]="serviceName" name="serviceName" placeholder="Name des Services eingeben"
                class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-brand-500 dark:bg-gray-800 dark:border-gray-700 outline-none"
                required />
        </div>

        @if (errorMessage) {
        <p class="text-sm text-red-500">
            {{ errorMessage }}
        </p>
        }

        <div class="flex flex-col sm:flex-row gap-3 pt-2">
            <button type="submit" [disabled]="isLoading || !serviceName.trim()"
                class="flex-1 bg-brand-500 text-white py-2 rounded-lg hover:bg-brand-600 transition cursor-pointer disabled:opacity-50">
                {{ isLoading ? 'Wird gespeichert...' : 'Speichern' }}
            </button>

            <a routerLink="/services/free"
                class="flex-1 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition text-center cursor-pointer">
                Abbrechen
            </a>
        </div>

    </form>
</div>
