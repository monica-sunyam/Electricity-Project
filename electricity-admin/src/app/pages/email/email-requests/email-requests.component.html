<div class="max-w-xl mx-auto bg-white dark:bg-gray-900 p-6 rounded-2xl shadow">

  <h2 class="text-xl font-semibold text-gray-800 dark:text-white mb-6">
        E-Mail Geschäftsführung</h2>

  <form class="space-y-5">

    <!-- Dropdown -->
    <div>
      <label class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">
        Wählen Sie E-Mail-Anfrage *
      </label>

      <select
      name="selectedCategory"
        [(ngModel)]="selectedCategory"
        class="w-full border rounded-xl px-4 py-3 outline-none"
      >
      class="border-2 border-dashed rounded-lg p-4 text-center cursor-pointer hover:border-brand-400 transition">
        <option value="">Select Option</option>
            @for (c of categories; track c.cateId) {

              <option [value]="c.cateId">
                {{ c.name }}
              </option>
            }
      </select>
    </div>

    <!-- Title -->
    <div>
      <label class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">
        Titel *
      </label>

      <input
        name="title"
        [(ngModel)]="title"
        type="text"
        placeholder="Enter tiel"
        class="w-full border rounded-xl px-4 py-3 outline-none"
      />
    </div>

    <!-- SubTitle -->
    <div>
      <label class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">
        Untertitel *
      </label>

      <input
        name="subtitle"
        [(ngModel)]="subtitle"
        type="text"
        placeholder="Enter Untertitel"
        class="w-full border rounded-xl px-4 py-3 outline-none"
      />
    </div>

    <!-- Text Area -->
    <div>
      <label class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">
        E-Mail Inhalte *
      </label>

      <div class="border rounded-xl overflow-hidden">

        <!-- Toolbar -->
        <div class="border-b px-4 py-3 flex gap-4 bg-gray-50">

          <button type="button"><b>B</b></button>

          <button type="button"><i>I</i></button>

          <button type="button">🔗</button>

          <button type="button">❝ ❞</button>

        </div>

        <!-- Textarea -->
        <textarea
          name="emailContent"
          [(ngModel)]="emailContent"
          rows="1"
          placeholder="E-Mail-Inhalte schreiben..."
          class="w-full p-4 outline-none"
        ></textarea>

      </div>
    </div>

    <!-- PDF FIELD -->

    <div class="relative">

      <label class="block text-sm font-medium mb-2 text-gray-700 dark:text-gray-300">
        Wählen PDFs (optional)
      </label>

      <div class="flex gap-2">

        <select
          #pdfSelect
          name="pdfSelect"
          [(ngModel)] = "selectedPdfValue"
          class="w-full border rounded-lg p-3 text-gray-500"
        >
          <option value="">wählen dein Pdf</option>
          <option
            *ngFor="let pdf of pdfList"
            [value]="pdf.adminDocId"
            class="text-black"
          >
            {{ pdf.originalFileName }}
          </option>

        </select>

        <button
          type="button"
          (click)="addPdf(pdfSelect.value)"
          class="w-8 h-8 rounded-full bg-blue-500 text-white"
        >
          +
        </button>

      </div>

    </div>

    <!-- SELECTED PDF LIST -->

    <div
      *ngFor="let pdf of selectedPdfs; let i = index"
      class="border-2 border-dashed border-gray-200 rounded-2xl p-4 mt-3 flex justify-between items-center hover:border-blue-400 hover:bg-blue-50 transition duration-200 cursor-pointer"
    >

      <span class="text-blue-600 underline truncate">
        {{ pdf.originalFileName }}
      </span>

      <button
        type="button"
        (click)="removePdf(i)"
        class="w-8 h-8 rounded-full bg-red-400 text-white"
      >
        🗑
      </button>

    </div>


  @if(message) {
    <div
      class="mb-4 p-3 rounded-lg text-sm"
      [class.bg-red-100]="isError"
      [class.text-red-700]="isError"
      [class.bg-green-100]="!isError"
      [class.text-green-700]="!isError"
    >
      {{ message }}
    </div>

  }

    <!-- Buttons -->
    <div class="flex gap-4 pt-6">

    <button
    (click)="submitForm()"
        type="button"
        class="flex-1 bg-brand-500 text-white py-2 rounded-lg hover:bg-brand-600 transition cursor-pointer disabled:opacity-50">
    Erstellen
    </button>

    <button
    (click)="cancelForm()"
    type="button"
    class="flex-1 bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-700 transition text-center cursor-pointer"
    >
    Abbrechen
    </button>

</div>

</form>

</div>
