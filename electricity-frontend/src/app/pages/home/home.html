<div class="home-container">
  <div class="home-left">
    <div class="electricity-container">
      <div class="electricity">
        @if (isLoading) {
        <p>Lade Services...</p>
        } @else {
        <button *ngFor="let item of sidebarItems" class="icon-btn-electricity"
          [routerLink]="[getRouterLink(item.originalFileName)]" routerLinkActive="active">
          <span class="electricity-comparison">
            <img [src]="getImageUrl(item.contentUrl)" [class]="getIconClass(item.originalFileName)"
              [alt]="item.originalFileName">
          </span>
          <span class="btn-text">{{ getLabel(item.originalFileName) }}</span>
        </button>
        }
      </div>
    </div>

    <div class="service-container">
      <div class="service-container">
        <div class="our-services-header">
          <span class="our-services"></span>
          <span class="btn-header-text">Unser Kostenloser Service</span>
        </div>
        <div class="container-items">
          <button *ngFor="let service of freeServices" class="icon-btn-service">
            <span class="our-services">
              <img src="assets/icons/Haken_Blau.png" class="icon-check" alt="check">
            </span>
            <span class="btn-text">{{ service.heading }}</span>
          </button>
          <p *ngIf="!isLoading && freeServices.length === 0">Keine Services verfügbar.</p>
        </div>
      </div>
    </div>
  </div>

  <div class="home-center">
    <router-outlet></router-outlet>
  </div>
</div>

<app-discount></app-discount>

<div class="container-services-by-company">

  <!-- about us -->
  <div class="container-about">
    <div class="container-header">Das sind wir</div>
    <ng-container *ngFor="let about of aboutItems">
      <div class="container-details">
        <div class="image">
          <img [src]="getImageUrl(about.contentUrl)" [alt]="about.heading">
        </div>
        <div class="about-text">
          <span class="about-header"><strong>{{ about.heading }}</strong></span><br>
          <span class="details" *ngIf="about.subHeading">{{ about.subHeading }}</span>
        </div>
      </div>
    </ng-container>
    <p *ngIf="!isLoading && aboutItems.length === 0">Keine Informationen verfügbar.</p>
  </div>

  <!-- other services — dynamic only -->
  <div class="container-other-services">
    <div class="main-container-service">
      <div class="container-header">Weitere Services</div>
      <div class="container-all-services">
        <div class="container-services-left">
          <ng-container *ngFor="let service of otherServices; let i = index">
            <button class="main-btn" *ngIf="i % 2 === 0">
              <span class="container-services">
                <img [src]="getImageUrl(service.contentUrl)" class="icon-transport" [alt]="service.heading">
              </span>
              <span class="btn-text">{{ service.heading }}</span>
            </button>
          </ng-container>
        </div>
        <div class="container-services-right">
          <ng-container *ngFor="let service of otherServices; let i = index">
            <button class="main-btn" *ngIf="i % 2 !== 0">
              <span class="container-services">
                <img [src]="getImageUrl(service.contentUrl)" class="icon-transport" [alt]="service.heading">
              </span>
              <span class="btn-text">{{ service.heading }}</span>
            </button>
          </ng-container>
        </div>
      </div>
      <p *ngIf="!isLoading && otherServices.length === 0">Keine weiteren Services verfügbar.</p>
    </div>
  </div>

  <app-need-support></app-need-support>

</div>
